    />

    <style>
      :root {
        --bg: #f2f1ee;
        --white: #ffffff;
        --dark: #18181b;
        --mid: #71717a;
        --light: #e4e4e7;
        --accent: #2563eb;
        --accent-soft: #eff6ff;
        --green: #059669;
        --green-soft: #ecfdf5;
        --orange: #ea580c;
        --orange-soft: #fff7ed;
        --red: #dc2626;
        --red-soft: #fef2f2;
        --yellow: #d97706;
        --yellow-soft: #fffbeb;
        --radius: 20px;
        --radius-sm: 12px;
        --shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background: var(--bg);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 32px 20px;
        font-family: "Sora", sans-serif;
      }

      .phone-frame {
        width: 375px;
        height: 812px;
        background: #f8f8f6;
        border-radius: 50px;
        overflow: hidden;
        box-shadow:
          0 40px 80px -20px rgba(0, 0, 0, 0.28),
          0 0 0 1.5px rgba(0, 0, 0, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
        position: relative;
        border: 10px solid #1a1a1f;
        display: flex;
        flex-direction: column;
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 22px 6px;
        font-size: 12px;
        color: var(--dark);
        font-weight: 700;
        font-family: "JetBrains Mono", monospace;
        background: #f8f8f6;
        flex-shrink: 0;
      }

      .scroll-area {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      .scroll-area::-webkit-scrollbar {
        display: none;
      }

      .page {
        padding: 20px 18px 100px;
      }

      .clickable {
        transition:
          transform 0.12s ease,
          opacity 0.12s ease;
        cursor: pointer;
        user-select: none;
      }
      .clickable:active {
        transform: scale(0.96);
        opacity: 0.75;
      }

      .card {
        background: var(--white);
        border-radius: var(--radius);
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: var(--shadow);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        border-radius: 8px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .tab-bar {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 90px;
        background: rgba(248, 248, 246, 0.92);
        backdrop-filter: blur(20px);
        border-top: 1px solid rgba(0, 0, 0, 0.06);
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 0 8px 24px;
        z-index: 50;
      }

      .tab-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        padding: 8px 12px;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .tab-item.active {
        background: rgba(37, 99, 235, 0.08);
      }
      .tab-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      /* Pill button */
      .pill-btn {
        padding: 8px 16px;
        border-radius: 100px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
        border: 1.5px solid transparent;
      }
      .pill-btn.active {
        background: var(--dark);
        color: white;
      }
      .pill-btn.inactive {
        background: var(--white);
        color: var(--mid);
        border-color: var(--light);
      }

      /* Input */
      .input-box {
        background: var(--white);
        border-radius: var(--radius-sm);
        padding: 13px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: var(--mid);
        box-shadow: var(--shadow);
        cursor: text;
        font-family: "Sora", sans-serif;
      }

      /* Timeline dot */
      .timeline-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 2px solid;
        background: white;
        flex-shrink: 0;
      }
      .timeline-dot.filled {
        background: var(--accent);
        border-color: var(--accent);
      }

      /* Switch */
      .switch {
        width: 46px;
        height: 26px;
        border-radius: 13px;
        position: relative;
        transition: 0.25s;
        cursor: pointer;
      }
      .switch-handle {
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 3px;
        transition: 0.25s;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      }

      /* Fade-in animation */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeUp 0.3s ease both;
      }

      /* Map placeholder */
      .map-bg {
        background: #e8eddf;
        border-radius: var(--radius-sm);
        position: relative;
        overflow: hidden;
      }
      .map-grid-lines {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
        background-size: 28px 28px;
      }
      .map-road {
        position: absolute;
        background: rgba(255, 255, 255, 0.75);
      }

      /* Nav controller */
      .nav-controller {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 420px;
        margin-bottom: 20px;
      }
      .nav-btn {
        background: white;
        border: none;
        border-radius: 8px;
        padding: 6px 13px;
        font-size: 11px;
        font-family: "Sora", sans-serif;
        font-weight: 600;
        cursor: pointer;
        color: #64748b;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
        transition: all 0.12s;
      }
      .nav-btn.active {
        background: #18181b;
        color: white;
      }

      .outer-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
    </style>
  </head>

      /* ══════════════════════════════════════
         MAIN APP
      ══════════════════════════════════════ */
      function App() {
        const [screen, setScreen] = useState("home");

        const allScreens = [
          "home",
          "bus",
          "mrt",
          "tra",
          "hsr",
          "bike",
          "map",
          "search",
          "tickets",
          "alerts",
          "profile",
        ];

        const tabKeyMap = {
          home: "home",
          search: "search",
          tickets: "tickets",
          alerts: "alerts",
          profile: "profile",
        };
        const activeTab =
          tabKeyMap[screen] ||
          (screen === "home" ||
          screen === "bus" ||
          screen === "mrt" ||
          screen === "tra" ||
          screen === "hsr" ||
          screen === "bike" ||
          screen === "map"
            ? "home"
            : null);

        const handleTab = (key) => {
          const m = {
            home: "home",
            search: "search",
            tickets: "tickets",
            alerts: "alerts",
            profile: "profile",
          };
          setScreen(m[key] || "home");
        };

        const renderScreen = () => {
          switch (screen) {
            case "home":
              return <HomePage onNav={setScreen} />;
            case "bus":
              return <BusPage onBack={() => setScreen("home")} />;
            case "mrt":
              return <MRTPage onBack={() => setScreen("home")} />;
            case "tra":
              return <TrainPage onBack={() => setScreen("home")} />;
            case "hsr":
              return <HSRPage onBack={() => setScreen("home")} />;
            case "bike":
              return <BikePage onBack={() => setScreen("home")} />;
            case "map":
              return <MapPage onBack={() => setScreen("home")} />;
            case "search":
              return <SearchPage onBack={() => setScreen("home")} />;
            case "tickets":
              return <TicketsPage onBack={() => setScreen("home")} />;
            case "alerts":
              return <AlertsPage onBack={() => setScreen("home")} />;
            case "profile":
              return <ProfilePage onBack={() => setScreen("home")} />;
            default:
              return <HomePage onNav={setScreen} />;
          }
        };

        return (
          <div
            style={{
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
            }}
          >
            {/* Screen controller */}
            <div className="nav-controller">
              {allScreens.map((k) => (
                <button
                  key={k}
                  className={`nav-btn ${screen === k ? "active" : ""}`}
                  onClick={() => setScreen(k)}
                >
                  {k.charAt(0).toUpperCase() + k.slice(1)}
                </button>
              ))}
            </div>

            {/* Phone */}
            <div className="phone-frame">
              <StatusBar />
              {renderScreen()}
              <TabBar active={activeTab} onTab={handleTab} />
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
