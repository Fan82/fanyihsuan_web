<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --primary: #1248c7;
        --primary-light: #e8eeff;
        --secondary: #6b7280;
        --bg: #f3f4f6;
        --white: #ffffff;
        --dark: #111827;
        --success: #10b981;
        --danger: #ef4444;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        background: #092360;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        padding: 20px;
        overflow: hidden;
      }

      /* ── Phone Shell ── */
      .phone {
        width: 375px;
        height: 812px;
        background: #f5f5f7;
        border-radius: 44px;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        box-shadow:
          0 0 0 2px #444,
          0 0 0 12px #1c1c1e,
          0 40px 80px rgba(0, 0, 0, 0.7);
      }
      .status-bar {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 20px 24px;
        font-size: 12px;
        font-weight: 600;
        color: #111;
        flex-shrink: 0;
      }
      .screen {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: #fff;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px 12px;
        background: #fff;
        border-bottom: 1px solid #f0f0f0;
        flex-shrink: 0;
      }
      .back-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #f3f4f6;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        font-weight: 700;
      }
      .content {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px 90px;
        -webkit-overflow-scrolling: touch;
      }
      .content::-webkit-scrollbar {
        display: none;
      }

      /* ── Bottom Nav ── */
      .bottom-nav {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 85px;
        background: #fff;
        border-top: 1px solid #f0f0f0;
        display: flex;
        justify-content: space-around;
        align-items: flex-start;
        padding-top: 10px;
        z-index: 50;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        font-size: 10px;
        color: #9ca3af;
        cursor: pointer;
        padding: 4px 12px;
        border-radius: 12px;
      }
      .nav-item.active {
        color: var(--primary);
      }
      .nav-icon {
        font-size: 20px;
      }

      /* ── Welcome ── */
      .welcome {
        height: 100%;
        background: #1248c7;
        /* background: linear-gradient(180deg, #0a0a1a 0%, #1248c7 100%); */
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 80px 28px 50px;
        position: relative;
        overflow: hidden;
      }

      .plane-loader {
        position: relative;
        width: 280px;
        height: 280px;
        /* background-color: #00afdd; */
        border-radius: 50%;
        overflow: hidden;
        z-index: 1;
        box-shadow: 0 10px 30px rgba(0, 175, 221, 0.3);
      }

      .plane {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        height: 130px;
        width: 130px;
        background-size: contain;
        background-repeat: no-repeat;
        z-index: 10;
      }

      /* 雲朵通用樣式 */
      .cloud {
        position: absolute;
        background-size: contain;
        background-repeat: no-repeat;
        opacity: 0.8;
      }

      /* 氣流粒子樣式 */
      .steam {
        height: 120px;
        width: 10px;
        /* background: linear-gradient(transparent, #fff); */
        /* border-radius: 5px; */
        /* animation: steam 2s ease-in-out infinite; */
      }
      .steam div {
        opacity: 0;
        position: absolute;
        height: 120px;
        width: 10px;
        background: #fff;
        border-radius: 5px;
        animation: steam 0.4s ease-in-out infinite;
      }

      @keyframes steam {
        0% {
          transform: translate(0, 0) scale(0);
          opacity: 0;
        }
        100% {
          transform: translate(0, 280px) scale(1, 3);
          opacity: 0.8;
        }
      }

      .cloud {
        position: absolute;
        font-size: 40px;
        opacity: 0.12;
        animation: drift 4s linear infinite;
      }
      .cloud:nth-child(2) {
        top: 12%;
        animation-delay: 0.5s;
        font-size: 44px;
      }
      .cloud:nth-child(3) {
        top: 28%;
        animation-delay: 1.5s;
        font-size: 46px;
      }
      @keyframes drift {
        0% {
          left: -60px;
          opacity: 0.05;
        }
        50% {
          opacity: 0.15;
        }
        100% {
          left: 110%;
          opacity: 0.05;
        }
      }

      /* ── Tabs ── */
      .tab-bar {
        display: flex;
        background: #f3f4f6;
        border-radius: 14px;
        padding: 4px;
        margin-bottom: 20px;
      }
      .tab {
        flex: 1;
        padding: 9px 4px;
        text-align: center;
        font-size: 12px;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
        color: var(--secondary);
        transition: all 0.25s;
      }
      .tab.active {
        background: #fff;
        color: var(--primary);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      /* ── Field Cards ── */
      .field-card {
        background: #fff;
        border: 1.5px solid #f0f0f0;
        border-radius: 16px;
        padding: 13px 16px;
        margin: 8px 0;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .field-card:hover,
      .field-card:focus-within {
        border-color: var(--primary);
        background: #fafbff;
      }
      .field-card .lbl {
        font-size: 10px;
        font-weight: 700;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 5px;
      }
      .field-card input {
        border: none;
        font-size: 15px;
        font-weight: 600;
        color: var(--dark);
        width: 100%;
        outline: none;
        background: transparent;
        cursor: pointer;
      }
      .field-card input::placeholder {
        color: #c0c4cc;
        font-weight: 400;
      }

      /* ── Swap ── */
      .swap-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 2px 0;
      }
      .swap-line {
        flex: 1;
        height: 1px;
        background: #f0f0f0;
      }
      .swap-btn {
        width: 36px;
        height: 36px;
        background: #fff;
        border: 1.5px solid #e5e7eb;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 16px;
        transition: all 0.3s;
        flex-shrink: 0;
      }
      .swap-btn:active {
        transform: rotate(180deg);
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }

      /* ── Buttons ── */
      .primary-btn {
        background: var(--primary);
        color: #fff;
        border: none;
        width: 100%;
        padding: 17px;
        border-radius: 16px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.3px;
      }
      .primary-btn:active {
        transform: scale(0.97);
        opacity: 0.9;
      }
      .primary-btn:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }

      /* ── Date Scroller ── */
      .date-scroller {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        margin: 0 -20px 20px;
        padding: 4px 20px 8px;
        -webkit-overflow-scrolling: touch;
      }
      .date-scroller::-webkit-scrollbar {
        display: none;
      }
      .date-item {
        min-width: 56px;
        height: 76px;
        background: #fff;
        border: 1.5px solid #e5e7eb;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .date-item.active {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
        transform: scale(1.05);
      }
      .date-item .day {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        opacity: 0.7;
        margin-bottom: 3px;
      }
      .date-item .num {
        font-size: 20px;
        font-weight: 800;
      }
      .date-item .price {
        font-size: 8px;
        font-weight: 600;
        opacity: 0.6;
        margin-top: 2px;
      }

      /* ── Flight Cards ── */
      .flight-card {
        border: 1.5px solid #e5e7eb;
        border-radius: 20px;
        padding: 18px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: all 0.2s;
        background: #fff;
      }
      .flight-card:active {
        transform: scale(0.98);
        border-color: var(--primary);
      }
      .airline-logo {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 800;
        color: #fff;
        flex-shrink: 0;
      }
      .route-line {
        flex: 1;
        margin: 0 12px;
        position: relative;
        display: flex;
        align-items: center;
      }
      .dashed {
        width: 100%;
        border-top: 1.5px dashed #d1d5db;
      }
      .plane-ico {
        position: absolute;
        left: 50%;
        transform: translateX(-50%) translateY(-50%) rotate(90deg);
        font-size: 14px;
        color: var(--primary);
        top: 0;
      }
      .badge {
        display: inline-block;
        padding: 3px 9px;
        border-radius: 8px;
        font-size: 10px;
        font-weight: 700;
      }
      .badge-green {
        background: #ecfdf5;
        color: #059669;
      }
      .badge-amber {
        background: #fffbeb;
        color: #d97706;
      }
      .badge-blue {
        background: var(--primary-light);
        color: var(--primary);
      }

      /* ── Class Selection ── */
      .class-row {
        border: 1.5px solid #e5e7eb;
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 10px;
        display: flex;
        align-items: flex-start;
        cursor: pointer;
        transition: all 0.2s;
        gap: 12px;
      }
      .class-row.active {
        border-color: var(--primary);
        background: #fafbff;
      }
      .class-row:active {
        transform: scale(0.98);
      }
      .radio-circle {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid #d1d5db;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .class-row.active .radio-circle {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }

      /* ── Seat Map ── */
      .seat-row {
        display: grid;
        grid-template-columns: 44px 44px 28px 44px 44px;
        gap: 8px;
        justify-content: center;
        margin-bottom: 8px;
      }
      .seat {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        border: 1.5px solid transparent;
      }
      .seat.free {
        background: #f3f4f6;
        color: #6b7280;
        border-color: #e5e7eb;
      }
      .seat.free:active {
        transform: scale(0.9);
      }
      .seat.selected {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
        transform: scale(1.06);
      }
      .seat.taken {
        background: #f3f4f6;
        cursor: not-allowed;
        position: relative;
        overflow: hidden;
      }
      .seat.taken::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 2px;
        background: #cbd5e1;
        transform: rotate(-45deg) scale(1.4);
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--secondary);
      }
      .legend-dot {
        width: 14px;
        height: 14px;
        border-radius: 4px;
      }

      /* ── Toggle ── */
      .toggle {
        width: 46px;
        height: 26px;
        border-radius: 13px;
        border: none;
        cursor: pointer;
        transition: all 0.3s;
        position: relative;
        flex-shrink: 0;
      }
      .toggle.on {
        background: var(--primary);
      }
      .toggle.off {
        background: #e5e7eb;
      }
      .toggle::after {
        content: "";
        position: absolute;
        top: 3px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #fff;
        transition: all 0.3s;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
      }
      .toggle.on::after {
        left: 23px;
      }
      .toggle.off::after {
        left: 3px;
      }

      /* ── Boarding Pass ── */
      .pass-card {
        background: #fff;
        border-radius: 28px;
        padding: 24px;
        position: relative;
        overflow: hidden;
        margin-bottom: 16px;
      }
      .pass-card::before,
      .pass-card::after {
        content: "";
        position: absolute;
        width: 24px;
        height: 24px;
        background: linear-gradient(135deg, #0a0a2e, var(--primary));
        border-radius: 50%;
        top: 62%;
      }
      .pass-card::before {
        left: -12px;
      }
      .pass-card::after {
        right: -12px;
      }

      /* ── Page enter animation ── */
      .page-enter {
        animation: slideIn 0.28s ease-out;
      }
      @keyframes slideIn {
        from {
          transform: translateX(32px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      /* ── Airport Picker ── */
      .airport-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #fff;
        z-index: 200;
        display: flex;
        flex-direction: column;
      }

      /* ── Summary rows ── */
      .sum-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        font-size: 14px;
      }
      .sum-row.total {
        border-top: 1.5px solid #f0f0f0;
        margin-top: 8px;
        padding-top: 16px;
        font-size: 16px;
        font-weight: 700;
      }

      /* ── Confirmation ── */
      .confirm-screen {
        flex: 1;
        background: linear-gradient(180deg, #ecfdf5, #d1fae5);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        text-align: center;
      }
      .check-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: var(--success);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        margin-bottom: 24px;
        animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      @keyframes pop {
        0% {
          transform: scale(0);
        }
        100% {
          transform: scale(1);
        }
      }

      /* ── Payment method ── */
      .payment-method {
        border: 1.5px solid #e5e7eb;
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 14px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .payment-method.active {
        border-color: var(--primary);
        background: #fafbff;
      }
      .payment-method:active {
        transform: scale(0.98);
      }

      /* ── Debug nav ── */
      .debug-panel {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 500px;
        margin-bottom: 16px;
      }
      .debug-btn {
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: rgba(255, 255, 255, 0.7);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
        font-weight: 400;
      }
      .debug-btn.active {
        background: #fff;
        color: var(--primary);
        border-color: #fff;
      }
    </style>
  </head>

        const [toggles, setToggles] = useState(SERVICES.map((s) => s.on));

            const n = [...t];
            n[i] = !n[i];
            return n;

        const extras = SERVICES.reduce(
          (sum, s, i) => sum + (toggles[i] ? s.price : 0),
          0,

        const cls =

        const total = cls.price + extras;

        return (

              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-dock-icon lucide-dock"
            >
              <path d="M2 8h20" />
              <rect width="20" height="16" x="2" y="4" rx="2" />
              <path d="M6 16h12" />
            </svg>
          ),
        };

        return (
          <div className="screen page-enter">
            <div className="header">
              <button className="back-btn" onClick={back}>
                ←
              </button>
              <strong>Payment</strong>
              <span />
            </div>
            <div className="content">
              {/* Amount banner */}
              <div
                style={{
                  background: "linear-gradient(135deg,#1248c7,#3b82f6)",
                  borderRadius: 20,
                  padding: "20px",
                  marginBottom: 20,
                  color: "#fff",
                }}
              >
                <div
                  style={{
                    fontSize: 10,
                    opacity: 0.7,
                    marginBottom: 10,
                    letterSpacing: 2,
                  }}
                >
                  TOTAL AMOUNT
                </div>
                <div
                  style={{ fontSize: 40, fontWeight: 900, letterSpacing: -1 }}
                >
                  ${total}
                </div>
                <div style={{ fontSize: 12, opacity: 0.7, marginTop: 4 }}>
                  {booking.from?.code || "SYD"} → {booking.to?.code || "LCY"} ·{" "}
                  {booking.travelClass || "Business"}
                </div>
              </div>

              <div
                style={{
                  fontSize: 11,
                  fontWeight: 700,
                  color: "#9ca3af",
                  textTransform: "uppercase",
                  letterSpacing: 1,
                  marginBottom: 10,
                }}
              >
                Payment Method
              </div>

              {[
                { id: "card", label: "Credit / Debit Card", icon: icons.card },
                { id: "apple", label: "Apple Pay", icon: icons.apple },
                { id: "paypal", label: "PayPal", icon: icons.paypal },
              ].map((m) => (
                <div
                  key={m.id}
                  className={`payment-method ${method === m.id ? "active" : ""}`}
                  onClick={() => setMethod(m.id)}
                >
                  <span style={{ fontSize: 24 }}>{m.icon}</span>
                  <span style={{ fontWeight: 600, fontSize: 14, flex: 1 }}>
                    {m.label}
                  </span>
                  <div className="radio-circle">{method === m.id && "✓"}</div>
                </div>
              ))}

              {method === "card" && (
                <div style={{ marginTop: 4 }}>
                  <div className="field-card">
                    <div className="lbl">Card Number</div>
                    <input
                      placeholder="1234 5678 9012 3456"
                      style={{
                        fontSize: 15,
                        fontWeight: 600,
                        letterSpacing: 1,
                      }}
                    />
                  </div>
                  <div
                    style={{
                      display: "grid",
                      gridTemplateColumns: "1fr 1fr",
                      gap: 10,
                    }}
                  >
                    <div className="field-card">
                      <div className="lbl">Expiry</div>
                      <input
                        placeholder="MM / YY"
                        style={{ fontWeight: 600 }}
                      />
                    </div>
                    <div className="field-card">
                      <div className="lbl">CVV</div>
                      <input
                        placeholder="•••"
                        type="password"
                        style={{ fontWeight: 600 }}
                      />
                    </div>
                  </div>
                </div>
              )}

              <button
                className="primary-btn"
                style={{ marginTop: 20 }}
                onClick={pay}
                disabled={processing}
              >
                {processing ? (
                  <span>⏳ Processing...</span>
                ) : (
                  <span
                    style={{
                      display: "flex",
                      justifyContent: "center",
                      gap: 5,
                    }}
                  >
                    Pay ${total} Securely
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="20"
                      height="20"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="lucide lucide-shield-alert-icon lucide-shield-alert"
                    >
                      <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
                      <path d="M12 8v4" />
                      <path d="M12 16h.01" />
                    </svg>
                  </span>
                )}
              </button>
              <div
                style={{
                  textAlign: "center",
                  fontSize: 11,
                  color: "#9ca3af",
                  marginTop: 12,
                }}
              >
                🔒 256-bit SSL encrypted · PCI DSS compliant
              </div>
            </div>
          </div>
        );
      }

      function BookingConfirmed({ next }) {
        return (
          <div className="confirm-screen page-enter">
            <div className="check-circle">✓</div>
            <h2
              style={{
                fontSize: 26,
                fontWeight: 900,
                color: "#065f46",
                marginBottom: 8,
              }}
            >
              Payment Successful!
            </h2>
            <p
              style={{
                color: "#6b7280",
                fontSize: 14,
                marginBottom: 8,
                lineHeight: 1.6,
              }}
            >
              Your booking is confirmed. A confirmation email has been sent.
            </p>
            <div
              style={{
                background: "#fff",
                borderRadius: 14,
                padding: "12px 20px",
                marginBottom: 32,
                width: "100%",
              }}
            >
              <div
                style={{
                  fontSize: 10,
                  color: "#9ca3af",
                  textAlign: "center",
                  letterSpacing: 1,
                  textTransform: "uppercase",
                  marginBottom: 6,
                }}
              >
                Booking Reference
              </div>
              <div
                style={{
                  fontSize: 22,
                  fontWeight: 900,
                  textAlign: "center",
                  color: "#111827",
                  letterSpacing: 3,
                }}
              >
                FLY-{Math.floor(Math.random() * 90000 + 10000)}
              </div>
            </div>
            <button
              className="primary-btn"
              style={{ background: "#059669" }}
              onClick={next}
            >
              View Boarding Pass ✈
            </button>
          </div>
        );
      }

      /* ══════════════════════════════════
         Page 10 — Boarding Pass / Ticket
      ══════════════════════════════════ */
      function FinalTicket({ back, booking }) {
        const p = booking.passenger || { name: "Alex Johnson" };
        const f = booking.flight || {
          dep: "09:00",
          arr: "14:30",
          airline: "Qantas",
        };
        // Generate a random-ish barcode as SVG rects
        const bars = Array.from({ length: 42 }, (_, i) => {
          const x = i * 4.5;
          const h = 20 + Math.floor(Math.random() * 28);
          const w = 1.5 + Math.floor(Math.random() * 2);
          return `<rect x="${x}" y="${50 - h}" width="${w}" height="${h}" fill="#111"/>`;
        }).join("");

        return (
          <div
            className="screen page-enter"
            style={{
              background: "linear-gradient(160deg,#0a0a2e 0%,#1248c7 100%)",
            }}
          >
            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                padding: "12px 20px",
                flexShrink: 0,
              }}
            >
              <button
                onClick={back}
                style={{
                  background: "rgba(255,255,255,0.15)",
                  border: "none",
                  borderRadius: 10,
                  padding: "8px 12px",
                  color: "#fff",
                  fontWeight: 600,
                  cursor: "pointer",
                  fontSize: 13,
                }}
              >
                ← Home
              </button>
              <span style={{ color: "#fff", fontWeight: 700 }}>
                Boarding Pass
              </span>
              <button
                style={{
                  background: "rgba(255,255,255,0.15)",
                  border: "none",
                  borderRadius: 10,
                  padding: "8px 12px",
                  color: "#fff",
                  fontWeight: 600,
                  cursor: "pointer",
                  fontSize: 13,
                }}
              >
                Share
              </button>
            </div>

            <div className="content">
              {/* Confirmed banner */}
              <div
                style={{
                  background: "rgba(255,255,255,0.1)",
                  borderRadius: 14,
                  padding: "10px 14px",
                  marginBottom: 16,
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                }}
              >
                <span style={{ fontSize: 20, color: "#fff" }}>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-check-icon lucide-check"
                  >
                    <path d="M20 6 9 17l-5-5" />
                  </svg>
                </span>
                <div>
                  <div style={{ color: "#fff", fontWeight: 700, fontSize: 13 }}>
                    Booking Confirmed
                  </div>
                  <div
                    style={{ color: "rgba(255,255,255,0.55)", fontSize: 11 }}
                  >
                    Check-in opens 24h before departure
                  </div>
                </div>
              </div>

              {/* Pass card */}
              <div className="pass-card">
                {/* Route header */}
                <div
                  style={{
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "flex-start",
                    marginBottom: 4,
                  }}
                >
                  <div>
                    <div
                      style={{
                        fontSize: 40,
                        fontWeight: 900,
                        letterSpacing: -1,
                      }}
                    >
                      {booking.from?.code || "SYD"}
                    </div>
                    <div style={{ fontSize: 12, color: "#9ca3af" }}>
                      {booking.from?.city || "Sydney"}
                    </div>
                  </div>
                  <div style={{ flex: 1, textAlign: "center", paddingTop: 10 }}>
                    <div
                      style={{
                        fontSize: 11,
                        color: "#1248c7",
                        fontWeight: 700,
                        marginBottom: 4,
                      }}
                    >
                      {f.dep} → {f.arr}
                    </div>
                    <div style={{ fontSize: 22 }}>
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        class="lucide lucide-plane-takeoff-icon lucide-plane-takeoff"
                      >
                        <path d="M2 22h20" />
                        <path d="M6.36 17.4 4 17l-2-4 1.1-.55a2 2 0 0 1 1.8 0l.17.1a2 2 0 0 0 1.8 0L8 12 5 6l.9-.45a2 2 0 0 1 2.09.2l4.02 3a2 2 0 0 0 2.1.2l4.19-2.06a2.41 2.41 0 0 1 1.73-.17L21 7a1.4 1.4 0 0 1 .87 1.99l-.38.76c-.23.46-.6.84-1.07 1.08L7.58 17.2a2 2 0 0 1-1.22.18Z" />
                      </svg>
                    </div>
                    <div
                      style={{ fontSize: 10, color: "#9ca3af", marginTop: 4 }}
                    >
                      {booking.travelClass || "Business"}
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div
                      style={{
                        fontSize: 40,
                        fontWeight: 900,
                        letterSpacing: -1,
                      }}
                    >
                      {booking.to?.code || "LCY"}
                    </div>
                    <div style={{ fontSize: 12, color: "#9ca3af" }}>
                      {booking.to?.city || "London"}
                    </div>
                  </div>
                </div>

                <hr
                  style={{
                    border: "none",
                    borderTop: "1.5px dashed #e5e7eb",
                    margin: "18px 0",
                  }}
                />

                {/* Details grid */}
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "1fr 1fr",
                    gap: 16,
                  }}
                >
                  {[
                    { l: "Passenger", v: p.name || "Alex Johnson" },
                    { l: "Date", v: "Dec 23, 2024" },
                    { l: "Flight", v: "UA-204" },
                    { l: "Gate", v: "B2" },
                    { l: "Class", v: booking.travelClass || "Business" },
                    { l: "Seat", v: booking.seat || "12A" },
                  ].map(({ l, v }) => (
                    <div key={l}>
                      <div
                        style={{
                          fontSize: 9,
                          color: "#9ca3af",
                          fontWeight: 700,
                          textTransform: "uppercase",
                          letterSpacing: 0.8,
                          marginBottom: 3,
                        }}
                      >
                        {l}
                      </div>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{v}</div>
                    </div>
                  ))}
                </div>

                <hr
                  style={{
                    border: "none",
                    borderTop: "1.5px dashed #e5e7eb",
                    margin: "18px 0",
                  }}
                />

                {/* Barcode */}
                <div style={{ textAlign: "center" }}>
                  <svg
                    viewBox="0 0 190 50"
                    style={{ width: "100%", height: 50 }}
                    dangerouslySetInnerHTML={{ __html: bars }}
                  />
                  <div
                    style={{
                      fontSize: 10,
                      letterSpacing: 3,
                      color: "#9ca3af",
                      marginTop: 6,
                    }}
                  >
                    002348576921034
                  </div>
                </div>
              </div>

              <button
                className="primary-btn"
                style={{
                  background: "rgba(255,255,255,0.2)",
                  border: "1.5px solid rgba(255,255,255,0.4)",
                  marginBottom: 10,
                }}
              >
                Add to Wallet
              </button>
              <button
                className="primary-btn"
                style={{
                  background: "rgba(255,255,255,0.1)",
                  border: "1.5px solid rgba(255,255,255,0.2)",
                }}
              >
                ⬇ Download PDF
              </button>
            </div>
          </div>
        );
      }

      const ALL_PAGES = [
        "welcome",
        "home",
        "results",
        "class",
        "seat",
        "extra",
        "info",
        "payment",
        "confirmed",
        "ticket",
      ];

      function App() {
        const [page, setPage] = useState("welcome");
        const [booking, setBooking] = useState({
          tripType: "Round Trip",
          pax: 1,
          from: null,
          to: null,
        });

        return (
          <div
            style={{
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              padding: "20px 0",
              gap: 16,
            }}
          >
            {/* Debug nav */}
            <div className="debug-panel">
              {ALL_PAGES.map((p) => (
                <button
                  key={p}
                  className={`debug-btn ${page === p ? "active" : ""}`}
                  onClick={() => setPage(p)}
                >
                  {p}
                </button>
              ))}
            </div>

            {/* Phone */}
            <div className="phone">
              <StatusBar />

              {page === "welcome" && (
                <WelcomePage next={() => setPage("home")} />
              )}
              {page === "home" && (
                <HomeBooking
                  next={() => setPage("results")}
                  booking={booking}
                  setBooking={setBooking}
                />
              )}
              {page === "results" && (
                <FlightResults
                  next={() => setPage("class")}
                  back={() => setPage("home")}
                  booking={booking}
                  setBooking={setBooking}
                />
              )}
              {page === "class" && (
                <ClassOptions
                  next={() => setPage("seat")}
                  back={() => setPage("results")}
                  booking={booking}
                  setBooking={setBooking}
                />
              )}
              {page === "seat" && (
                <SeatSelection
                  next={() => setPage("extra")}
                  back={() => setPage("class")}
                  booking={booking}
                  setBooking={setBooking}
                />
              )}
              {page === "extra" && (
                <ExtraService
                  next={() => setPage("info")}
                  back={() => setPage("seat")}
                  booking={booking}
                  setBooking={setBooking}
                />
              )}
              {page === "info" && (
                <PassengerInfo
                  next={() => setPage("payment")}
                  back={() => setPage("extra")}
                  booking={booking}
                  setBooking={setBooking}
                />
              )}
              {page === "payment" && (
                <PaymentPage
                  next={() => setPage("confirmed")}
                  back={() => setPage("info")}
                  booking={booking}
                />
              )}
              {page === "confirmed" && (
                <BookingConfirmed next={() => setPage("ticket")} />
              )}
              {page === "ticket" && (
                <FinalTicket back={() => setPage("home")} booking={booking} />
              )}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
