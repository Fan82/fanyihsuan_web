                    style={{ display: "flex", gap: 8, alignItems: "center" }}
                  >
                    <input
                      defaultValue="10:00 am"
                      style={{
                        background: "#171A32",
                        border: "1px solid #374151",
                        borderRadius: 8,
                        padding: "8px 12px",
                        color: "#fff",
                        fontSize: 13,
                        outline: "none",
                        width: 100,
                      }}
                    />
                    <span style={{ color: "#6b7280" }}>—</span>
                    <input
                      defaultValue="10:00 am"
                      style={{
                        background: "#171A32",
                        border: "1px solid #374151",
                        borderRadius: 8,
                        padding: "8px 12px",
                        color: "#fff",
                        fontSize: 13,
                        outline: "none",
                        width: 100,
                      }}
                    />
                  </div>
                </div>
                <div style={{ marginBottom: 20 }}>
                  <p
                    style={{ fontSize: 12, color: "#6b7280", marginBottom: 6 }}
                  >
                    Note
                  </p>
                  <textarea
                    placeholder="Add a note..."
                    style={{
                      background: "#171A32",
                      border: "1px solid #374151",
                      borderRadius: 8,
                      padding: "8px 12px",
                      color: "#fff",
                      fontSize: 13,
                      outline: "none",
                      width: "100%",
                      resize: "none",
                      height: 60,
                    }}
                  />
                </div>
                <div
                  style={{
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    marginBottom: 20,
                  }}
                >
                  <span style={{ fontSize: 14, color: "#9ca3af" }}>
                    Make Important
                  </span>
                  <div
                    onClick={() => setImportant((v) => !v)}
                    style={{
                      width: 44,
                      height: 24,
                      borderRadius: 12,
                      background: important ? "#FFAE00" : "#374151",
                      cursor: "pointer",
                      position: "relative",
                      transition: "background 0.2s",
                    }}
                  >
                    <div
                      style={{
                        width: 20,
                        height: 20,
                        borderRadius: "50%",
                        background: "#fff",
                        position: "absolute",
                        top: 2,
                        left: important ? 22 : 2,
                        transition: "left 0.2s",
                      }}
                    />
                  </div>
                </div>
                <button
                  onClick={onSave}
                  style={{
                    width: "100%",
                    background: "#ffae00",
                    border: "none",
                    borderRadius: 14,
                    padding: "14px",
                    fontSize: 16,
                    fontWeight: 600,
                    cursor: "pointer",
                    color: "#fff",
                  }}
                >
                  Done
                </button>
              </div>
            </div>
          </div>
        );
      }

      function ActivePage({ onBack, onAddTask }) {
        const active = TASKS.filter((t) => !t.done);
        return (
          <div
            style={{
              background: "linear-gradient(160deg,#0f0f1a 0%,#1a1a2e 100%)",
              minHeight: 812,
            }}
          >
            <StatusBar />
            <div style={{ padding: "24px 24px 0" }}>
              <BackInfo onBack={onBack} />
              <TopProcess />

              <TodayAdd onAddTask={onAddTask} />

              <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
                {["All", "Active", "Important", "Completed"].map((t) => (
                  <span
                    key={t}
                    style={{
                      background: t === "Active" ? "#FFAE00" : "transparent",
                      border: "1px solid #374151",
                      borderRadius: 20,
                      padding: "5px 12px",
                      color: t === "Active" ? "#fff" : "#9ca3af",
                      fontSize: 12,
                    }}
                  >
                    {t}
                  </span>
                ))}
              </div>
              {active.map((task) => (
                <TaskItem key={task.id} task={task} onClick={() => {}} />
              ))}
            </div>
          </div>
        );
      }

      function MonthlyPage({ onBack, onMonthly, onWeekly }) {
        const days = Array.from({ length: 31 }, (_, i) => i + 1);
        const today = 10;
        return (
          <div
            style={{
              background: "linear-gradient(160deg,#0f0f1a 0%,#1a1a2e 100%)",
              minHeight: 812,
            }}
          >
            <StatusBar />
            <div style={{ padding: "24px 24px 0" }}>
              <div
                style={{ position: "relative", marginBottom: 16, height: 36 }}
              >
                <StickyBottomNav
                  currentScreen="monthly"
                  onMonthly={onMonthly}
                  onWeekly={onWeekly}
                />
                <BackBtn onBack={onBack} />
              </div>
              <div
                style={{
                  background: "#1f293775",
                  borderRadius: 16,
                  padding: "16px",
                  marginBottom: 16,
                }}
              >
                <div
                  style={{
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "center",
                    marginBottom: 12,
                  }}
                >
                  <span
                    style={{
                      color: "#6b7280",
                      fontSize: 18,
                      cursor: "pointer",
                    }}
                  >
                    ‹
                  </span>
                  <span
                    style={{ color: "#fff", fontWeight: 400, fontSize: 15 }}
                  >
                    October 2026
                  </span>
                  <span
                    style={{
                      color: "#6b7280",
                      fontSize: 18,
                      cursor: "pointer",
                    }}
                  >
                    ›
                  </span>
                </div>
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "repeat(7,1fr)",
                    gap: 4,
                    marginBottom: 8,
                  }}
                >
                  {["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"].map(
                    (d) => (
                      <div
                        key={d}
                        style={{
                          textAlign: "center",
                          fontSize: 11,
                          color: "#6b7280",
                          padding: "4px 0",
                        }}
                      >
                        {d}
                      </div>
                    ),
                  )}
                </div>
                <div
                  style={{
                    display: "grid",
                    gridTemplateColumns: "repeat(7,1fr)",
                    gap: 4,
                  }}
                >
                  {Array.from({ length: 4 }).map((_, i) => (
                    <div key={`e${i}`} />
                  ))}
                  {days.map((d) => (
                    <div
                      key={d}
                      style={{
                        textAlign: "center",
                        padding: "6px 2px",
                        borderRadius: 200,
                        background: d === today ? "#FFAE00" : "transparent",
                        color:
                          d === today
                            ? "#fff"
                            : d < today
                              ? "#4b5563"
                              : "#e2e8f0",
                        fontSize: 13,
                        cursor: "pointer",
                        fontWeight: d === today ? 700 : 400,
                      }}
                    >
                      {d}
                      {[4, 9, 15, 22].includes(d) && (
                        <div
                          style={{
                            width: 4,
                            height: 4,
                            borderRadius: "50%",
                            background: "#FFAE00",
                            margin: "2px auto 0",
                          }}
                        />
                      )}
                    </div>
                  ))}
                </div>
              </div>
              <h3
                style={{
                  fontSize: 14,
                  fontWeight: 600,
                  color: "#9ca3af",
                  marginBottom: 12,
                }}
              >
                October 5 · Monday
              </h3>
              {TASKS.map((task) => (
                <TaskItem key={task.id} task={task} onClick={() => {}} />
              ))}
            </div>
          </div>
        );
      }

      function WeeklyPage({ onBack, onMonthly, onWeekly }) {
        const days = [
          { d: "Oct 8", label: "Thu" },
          { d: "Oct 9", label: "Fri" },
          { d: "Oct 10", label: "Sat", today: true },
          { d: "Oct 11", label: "Sun" },
          { d: "Oct 12", label: "Mon" },
        ];
        return (
          <div
            style={{
              background: "linear-gradient(160deg,#0f0f1a 0%,#1a1a2e 100%)",
              minHeight: 812,
            }}
          >
            <StatusBar />
            <div style={{ padding: "24px 24px 0" }}>
              <div
                style={{ position: "relative", marginBottom: 16, height: 36 }}
              >
                <StickyBottomNav
                  currentScreen="weekly"
                  onMonthly={onMonthly}
                  onWeekly={onWeekly}
                />
                <BackBtn onBack={onBack} />
              </div>
              <div
                style={{
                  display: "flex",
                  gap: 8,
                  marginBottom: 20,
                  justifyContent: "center",
                }}
              >
                {days.map(({ d, label, today }) => (
                  <div
                    key={d}
                    style={{
                      textAlign: "center",
                      background: today ? "#374151" : "#1f293775",
                      borderRadius: 12,
                      padding: "10px 10px",
                      minWidth: 60,
                    }}
                  >
                    <p
                      style={{
                        fontSize: 11,
                        color: today ? "#fff" : "#fff",
                        marginBottom: 4,
                      }}
                    >
                      {d}
                    </p>
                    <p
                      style={{
                        fontSize: 15,
                        fontWeight: 700,
                        color: today ? "#fff" : "#fff",
                      }}
                    >
                      {label}
                    </p>
                    {today && (
                      <div
                        style={{
                          width: 6,
                          height: 6,
                          borderRadius: "50%",
                          background: "#fff",
                          margin: "4px auto 0",
                        }}
                      />
                    )}
                  </div>
                ))}
              </div>
              <h3
                style={{
                  fontSize: 14,
                  fontWeight: 600,
                  color: "#9ca3af",
                  marginBottom: 12,
                }}
              >
                October 5 · Monday
              </h3>
              {TASKS.map((task) => (
                <TaskItem key={task.id} task={task} onClick={() => {}} />
              ))}
            </div>
          </div>
        );
      }

      function NotifyPage({ onBack }) {
        return (
          <div
            style={{
              background: "linear-gradient(160deg,#0f0f1a 0%,#1a1a2e 100%)",
              minHeight: 812,
            }}
          >
            <StatusBar />
            <div style={{ padding: "24px 24px 0" }}>
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: 12,
                  marginBottom: 20,
                }}
              >
                <BackBtn onBack={onBack} />
                <h2 style={{ fontSize: 18, fontWeight: 700, color: "#fff" }}>
                  Notification
                </h2>
              </div>
              {NOTIFS.map((n) => (
                <div
                  key={n.id}
                  style={{
                    background: "#1f293775",
                    borderRadius: 14,
                    padding: "14px 16px",
                    marginBottom: 10,
                  }}
                >
                  <div
                    style={{
                      display: "flex",
                      gap: 10,
                      alignItems: "flex-start",
                    }}
                  >
                    <div
                      style={{
                        width: 8,
                        height: 8,
                        borderRadius: "50%",
                        background: n.accent,
                        marginTop: 5,
                        flexShrink: 0,
                      }}
                    />
                    <p
                      style={{
                        fontSize: 14,
                        color: "#e2e8f0",
                        lineHeight: 1.5,
                      }}
                    >
                      {n.text.includes("October") ? (
                        <>
                          {n.text
                            .split(
                              /(October \d+ challenge|October \d+ Challenge)/g,
                            )
                            .map((part, i) =>
                              part.match(
                                /(October \d+ challenge|October \d+ Challenge)/,
                              ) ? (
                                <span
                                  key={i}
                                  style={{
                                    fontStyle: "italic",
                                    fontWeight: 100,
                                    marginTop: 8,
                                  }}
                                >
                                  {part}
                                </span>
                              ) : (
                                part
                              ),
                            )}
                        </>
                      ) : (
                        n.text
                      )}
                    </p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      function App() {
        const [screen, setScreen] = useState("start");
        const [selectedTask, setSelectedTask] = useState(null);

        const screens = {
          start: <StartPage onNext={() => setScreen("login")} />,
          login: (
            <LoginPage
              onLogin={() => setScreen("home")}
              onSignup={() => setScreen("create")}
            />
          ),
          create: (
            <CreateAccount
              onBack={() => setScreen("login")}
              onSignup={() => setScreen("login")}
            />
          ),
          home: (
            <HomePage
              onBell={() => setScreen("notify")}
              onTask={(t) => {
                setSelectedTask(t);
                setScreen("detail");
              }}
              onAddTask={() => setScreen("add")}
              onNoData={() => setScreen("nodata")}
              onActive={() => setScreen("active")}
              onMonthly={() => setScreen("monthly")}
              onWeekly={() => setScreen("weekly")}
            />
          ),
          nodata: (
            <NoDataPage
              onBack={() => setScreen("home")}
              onAdd={() => setScreen("add")}
            />
          ),
          add: (
            <AddTaskPage
              onBack={() => setScreen("home")}
              onSave={() => setScreen("home")}
            />
          ),
          active: <ActivePage onBack={() => setScreen("home")} />,
          monthly: (
            <MonthlyPage
              onBack={() => setScreen("home")}
              onMonthly={() => setScreen("monthly")}
              onWeekly={() => setScreen("weekly")}
            />
          ),
          weekly: (
            <WeeklyPage
              onBack={() => setScreen("home")}
              onMonthly={() => setScreen("monthly")}
              onWeekly={() => setScreen("weekly")}
            />
          ),
          notify: <NotifyPage onBack={() => setScreen("home")} />,
        };

        return (
          <div
            style={{
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: 16,
              padding: "20px 0",
            }}
          >
            <div
              style={{
                display: "flex",
                gap: 8,
                flexWrap: "wrap",
                justifyContent: "center",
                maxWidth: 500,
              }}
            >
              {[
                ["start", "StartPage"],
                ["login", "LoginPage"],
                ["create", "CreateAccount"],
                ["home", "HomePage"],
                ["nodata", "NoDataPage"],
                ["add", "AddTaskPage"],
                ["active", "ActivePage"],
                ["monthly", "Monthly"],
                ["weekly", "Weekly"],
                ["notify", "Notification"],
              ].map(([s, label]) => (
                <button
                  key={s}
                  onClick={() => setScreen(s)}
                  style={{
                    background: screen === s ? "#FFAE00" : "#1f293775",
                    border: "1px solid #374151",
                    borderRadius: 8,
                    padding: "6px 12px",
                    color: screen === s ? "#fff" : "#9ca3af",
                    fontSize: 12,
                    cursor: "pointer",
                    fontWeight: screen === s ? 600 : 400,
                  }}
                >
                  {label}
                </button>
              ))}
            </div>
            <div
              style={{
                width: 375,
                background: "#171A32",
                borderRadius: 44,
                height: 812,
                overflow: "hidden",
                boxShadow: "0 0 0 10px #2a2a3e,0 30px 80px rgba(0,0,0,0.6)",
                border: "1px solid #333",
                position: "relative",
              }}
            >
              {screens[screen]}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
