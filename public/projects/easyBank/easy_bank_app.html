<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Bank</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --blue: #2563eb;
        --blue-light: #eff6ff;
        --blue-mid: #bfdbfe;
        --dark: #0f172a;
        --mid: #334155;
        --muted: #94a3b8;
        --bg: #f8fafc;
        --white: #ffffff;
        --green: #10b981;
        --red: #ef4444;
        --border: #e2e8f0;
        --gradient: linear-gradient(135deg, #1d4ed8 0%, #11296d 100%);
        --shadow:
          0 1px 3px rgba(15, 23, 42, 0.08), 0 4px 16px rgba(37, 99, 235, 0.06);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: #171a32;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      .phone-frame {
        width: 375px;
        height: 812px;
        background: linear-gradient(180deg, #ffffff 0%, #fff5e6 100%);
        border-radius: 44px;
        overflow: hidden;
        position: relative;
        border: 8px solid #2a2a3e;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
      }
      .topnav {
        background: var(--white);
        border-bottom: 1px solid var(--border);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .logo {
        font-family: "DM Sans", sans-serif;
        font-size: 22px;
        color: var(--blue);
        font-weight: 800;
      }
      .logo span {
        color: var(--dark);
      }
      .nav-container {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 560px;
      }
      .tab {
        padding: 5px 10px;
        font-size: 11px;
        cursor: pointer;
        font-weight: 400;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        transition: 0.2s;
        font-family: "DM Sans", sans-serif;
      }
      .tab.active {
        color: #fff;
        background: var(--blue);
        border-color: var(--blue);
      }
      .main-content {
        flex: 1;
        overflow-y: auto;
        padding: 16px 16px 90px;
        scrollbar-width: thin;
        scrollbar-color: var(--blue-mid) transparent;
      }
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .section-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--dark);
        letter-spacing: 0.04em;
      }
      .more-link {
        font-size: 12px;
        color: var(--blue);
        cursor: pointer;
        font-weight: 500;
      }
      .update-badge {
        font-size: 10px;
        color: var(--muted);
      }
      .currency-header {
        display: grid;
        grid-template-columns: 1fr 70px 70px;
        padding: 0 0 8px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 2px;
      }
      .currency-header span {
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
      }
      .currency-header span:last-child,
      .currency-header span:nth-child(2) {
        text-align: center;
      }
      .currency-row {
        display: grid;
        grid-template-columns: 1fr 70px 70px;
        align-items: center;
        padding: 9px 8px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        border-radius: 8px;
        margin: 0 -8px;
        transition: background 0.15s;
      }
      .currency-row:last-child {
        border-bottom: none;
      }
      .currency-row:hover {
        background: var(--blue-light);
      }
      .currency-info {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .currency-flag {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
      }
      .currency-name {
        font-size: 13px;
        font-weight: 600;
      }
      .currency-rate {
        font-size: 12px;
        font-weight: 500;
        text-align: center;
        color: var(--mid);
      }
      .card {
        background: var(--white);
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 18px;
        margin-bottom: 14px;
      }
      .card-blue {
        position: relative;
        background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
        color: white;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 14px;
        overflow: hidden;
      }
      .card-blue::before {
        content: "";
        position: absolute;
        top: -30px;
        right: -30px;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
      }
      .card-blue::after {
        content: "";
        position: absolute;
        bottom: -40px;
        left: 20px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.05);
      }
      .sm-arrow {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        cursor: pointer;
      }
      .balance-label {
        font-size: 10px;
        opacity: 0.8;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 5px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .balance-amount {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .quick-actions {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 16px;
      }
      .action-btn {
        background: none;
        border: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        transition: transform 0.15s;
      }
      .action-btn:hover {
        transform: translateY(-2px);
      }
      .action-icon {
        width: 46px;
        height: 46px;
        background: var(--blue-light);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 19px;
        color: var(--blue);
        transition: background 0.2s;
      }
      .action-btn:hover .action-icon {
        background: var(--blue-mid);
      }
      .action-label {
        font-size: 10px;
        color: var(--mid);
        text-align: center;
        line-height: 1.3;
      }
      .form-group {
        margin-bottom: 14px;
      }
      .form-label {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 5px;
        display: flex;
        justify-content: space-between;
        color: var(--mid);
      }
      .form-input {
        width: 100%;
        padding: 11px 12px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        outline: none;
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        color: var(--dark);
        background: white;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .form-input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }
      .form-input::placeholder {
        color: var(--muted);
      }
      .btn-primary {
        width: 100%;
        padding: 13px;
        background: var(--blue);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        font-size: 14px;
        font-family: "DM Sans", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition:
          background 0.2s,
          transform 0.1s;
      }
      .btn-primary:hover {
        background: #1d4ed8;
      }
      .btn-primary:active {
        transform: scale(0.99);
      }
      .btn-outline {
        flex: 1;
        padding: 11px;
        border: 1.5px solid rgba(255, 255, 255, 0.4);
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        transition: background 0.2s;
      }
      .btn-outline:hover {
        background: rgba(255, 255, 255, 0.25);
      }
      .bottom-nav {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-top: 1px solid var(--border);
        display: flex;
        padding: 8px 0 20px;
      }
      .nav-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        cursor: pointer;
        border: none;
        background: none;
        color: var(--muted);
        padding: 4px 0;
        font-family: "DM Sans", sans-serif;
        transition: color 0.2s;
      }
      .nav-item.active {
        color: var(--blue);
      }
      .animate-fade {
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== TX LIST ===== */
      .tx-group {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 14px 0 6px;
      }
      .tx-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 8px;
        border-bottom: 1px solid var(--border);
        border-radius: 10px;
        margin: 0 -8px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .tx-row:last-child {
        border-bottom: none;
      }
      .tx-row:hover {
        background: var(--blue-light);
      }
      .tx-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .tx-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: var(--blue-light);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
      }
      .tx-name {
        font-size: 13px;
        font-weight: 500;
      }
      .tx-date {
        font-size: 11px;
        color: var(--muted);
        margin-top: 1px;
      }
      .tx-amount {
        font-size: 13px;
        font-weight: 600;
      }
      .debit {
        color: var(--red);
      }
      .credit {
        color: var(--green);
      }

      /* ===== DEPOSIT TABS ===== */
      .deposit-tabs {
        display: flex;
        border-radius: 10px;
        overflow: hidden;
        border: 1.5px solid var(--blue);
        margin-bottom: 18px;
      }
      .deposit-tab {
        flex: 1;
        padding: 10px;
        border: none;
        background: transparent;
        font-size: 12px;
        font-weight: 500;
        color: var(--blue);
        cursor: pointer;
        transition: all 0.2s;
        font-family: "DM Sans", sans-serif;
      }
      .deposit-tab.active {
        background: var(--blue);
        color: white;
      }

      /* ===== TRANSFER TABS ===== */
      .transfer-tabs {
        display: flex;
        background: var(--blue-light);
        border-radius: 10px;
        padding: 3px;
        margin-bottom: 18px;
        gap: 2px;
      }
      .transfer-tab {
        flex: 1;
        padding: 8px 4px;
        border: none;
        background: transparent;
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s;
        font-family: "DM Sans", sans-serif;
      }
      .transfer-tab.active {
        background: var(--blue);
        color: white;
      }

      /* ===== ACCOUNT CARD ===== */
      .account-card {
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 10px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .account-card:hover {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
      }
      .account-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }
      .account-number {
        font-size: 12px;
        font-weight: 500;
        color: var(--mid);
      }
      .account-balance {
        font-size: 20px;
        font-weight: 700;
        color: var(--dark);
      }
      .account-type {
        font-size: 10px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      /* ===== CREDIT CARD VISUAL ===== */
      .cc-visual {
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e3a5f 50%,
          #1d4ed8 100%
        );
        border-radius: 18px;
        padding: 22px;
        margin-bottom: 18px;
        color: white;
        position: relative;
        overflow: hidden;
      }
      .cc-visual::before {
        content: "";
        position: absolute;
        top: -20px;
        right: -20px;
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
      }
      .cc-visual::after {
        content: "";
        position: absolute;
        bottom: -35px;
        left: 10px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.04);
      }
      .cc-pending {
        font-size: 10px;
        opacity: 0.6;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 4px;
      }
      .cc-amount {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
        position: relative;
        z-index: 1;
      }
      .cc-number {
        font-size: 12px;
        opacity: 0.65;
        margin-top: 14px;
        letter-spacing: 0.12em;
        position: relative;
        z-index: 1;
      }

      /* ===== BILL CARD ===== */
      .bill-hero {
        background: var(--gradient);
        border-radius: 20px;
        padding: 26px 18px;
        text-align: center;
        color: white;
        margin-bottom: 16px;
      }
      .bill-amount {
        font-size: 38px;
        font-weight: 800;
        letter-spacing: -2px;
        margin: 6px 0 4px;
      }
      .bill-unbilled {
        font-size: 12px;
        opacity: 0.65;
      }

      /* ===== FILTER CHIPS ===== */
      .filter-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
      }
      .filter-bar::-webkit-scrollbar {
        display: none;
      }
      .filter-chip {
        padding: 5px 12px;
        border-radius: 20px;
        border: 1.5px solid var(--border);
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        background: white;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.2s;
        font-family: "DM Sans", sans-serif;
      }
      .filter-chip.active {
        background: var(--blue);
        border-color: var(--blue);
        color: white;
      }

      /* ===== QR ===== */
      .qr-box {
        width: 180px;
        height: 180px;
        background: var(--dark);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 90px;
        margin: 0 auto 16px;
      }

      /* ===== REGISTER ===== */
      .register-banner {
        background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        border-radius: 20px;
        padding: 26px 20px;
        color: white;
        margin-bottom: 16px;
        position: relative;
        overflow: hidden;
      }
      .register-banner::before {
        content: "";
        position: absolute;
        top: -40px;
        right: -40px;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
      }
      .register-banner h2 {
        font-size: 19px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .register-banner p {
        font-size: 12px;
        opacity: 0.8;
        line-height: 1.5;
      }
      .register-cta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 14px;
        position: relative;
        z-index: 1;
      }
      .register-cta span {
        font-size: 13px;
        opacity: 0.9;
        font-weight: 500;
      }
      .circle-arrow {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      .unlock-banner {
        background: var(--blue-light);
        border: 1.5px solid var(--blue-mid);
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 14px;
      }
      .unlock-banner h3 {
        font-size: 14px;
        font-weight: 600;
        color: var(--blue);
        margin-bottom: 4px;
      }
      .unlock-banner p {
        font-size: 12px;
        color: var(--mid);
        line-height: 1.5;
      }

      /* ===== TOGGLE ===== */
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
      }
      .toggle {
        width: 38px;
        height: 21px;
        background: var(--border);
        border-radius: 11px;
        position: relative;
        cursor: pointer;
        transition: background 0.2s;
        flex-shrink: 0;
      }
      .toggle::after {
        content: "";
        position: absolute;
        top: 2.5px;
        left: 2.5px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: white;
        transition: transform 0.2s;
      }
      .toggle.on {
        background: var(--blue);
      }
      .toggle.on::after {
        transform: translateX(17px);
      }

      /* ===== NOTIFY ===== */
      .notify-row {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
      }
      .notify-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--blue);
        margin-top: 5px;
        flex-shrink: 0;
      }
      .notify-dot.read {
        background: var(--border);
      }
      .notify-title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 2px;
      }
      .notify-body {
        font-size: 12px;
        color: var(--mid);
        line-height: 1.4;
      }
      .notify-time {
        font-size: 10px;
        color: var(--muted);
        margin-top: 3px;
      }

      /* ===== SETTING ===== */
      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 0;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }
      .setting-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .setting-icon {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: var(--blue-light);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--blue);
      }
      .setting-label {
        font-size: 13px;
        font-weight: 500;
      }
      .chevron {
        color: var(--muted);
        font-size: 16px;
      }

      /* ===== EXCHANGE RATE ===== */
      .rate-input-row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 14px;
      }
      .rate-badge {
        font-size: 11px;
        background: var(--blue-light);
        color: var(--blue);
        padding: 3px 8px;
        border-radius: 6px;
        font-weight: 600;
        white-space: nowrap;
      }

      /* ===== INPUT HINT ===== */
      .input-hint {
        font-size: 10px;
        color: var(--muted);
        text-align: right;
        margin-top: 3px;
      }

      /* ===== SUCCESS STATE ===== */
      .success-ring {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(135deg, #10b981, #059669);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        font-size: 32px;
        box-shadow: 0 8px 24px rgba(16, 185, 129, 0.35);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      /* ========== SVG ICONS ========== */
      const EyeIcon = () => (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
