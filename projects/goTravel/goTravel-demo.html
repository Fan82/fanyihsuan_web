      function App() {
        const [screen, setScreen] = useState("start");
        const [selItem, setSelItem] = useState(ATTRACTIONS[0]);
        const [selPkg, setSelPkg] = useState(0);
        const [tab, setTab] = useState("home");

        const goTab = (t) => {
          setTab(t);
          const map = {
            home: "home",
            explore: "explore",
            trips: "trips",
            profile: "profile",
          };
          setScreen(map[t] || "home");
        };
        const goItem = (item) => {
          setSelItem(item);
          setScreen("detail");
        };

        const SCREENS = {
          start: <StartPage onNext={() => setScreen("login")} />,
          login: (
            <LoginPage
              onLogin={() => {
                setScreen("home");
                setTab("home");
              }}
              onSignup={() => setScreen("signup")}
            />
          ),
          signup: (
            <CreateAccount
              onBack={() => setScreen("login")}
              onSignup={() => setScreen("login")}
            />
          ),
          home: (
            <HomePage
              onBell={() => setScreen("notify")}
              onItem={goItem}
              onCity={(c) => c}
              onTab={goTab}
              tab={tab}
            />
          ),
          explore: <ExplorePage onItem={goItem} onTab={goTab} tab={tab} />,
          detail: (
            <DetailPage
              item={selItem}
              onBack={() =>
                setScreen(
                  ["home", "explore", "trips"].includes(tab) ? tab : "home",
                )
              }
              onBook={() => setScreen("booking")}
            />
          ),
          booking: (
            <BookingPage
              item={selItem}
              pkgIdx={selPkg}
              onBack={() => setScreen("detail")}
              onConfirm={() => setScreen("success")}
            />
          ),
          success: (
            <SuccessPage
              item={selItem}
              onHome={() => {
                setScreen("home");
                setTab("home");
              }}
              onMyTrips={() => {
                setScreen("trips");
                setTab("trips");
              }}
            />
          ),
          trips: <MyTripsPage onItem={goItem} onTab={goTab} tab={tab} />,
          profile: (
            <ProfilePage
              onTab={goTab}
              tab={tab}
              onNotif={() => setScreen("notify")}
            />
          ),
          notify: <NotifyPage onBack={() => setScreen(tab)} />,
        };

        const LABELS = {
          start: "Start",
          login: "Login",
          signup: "Sign Up",
          home: "Home",
          explore: "Explore",
          detail: "Detail",
          booking: "Booking",
          success: "Success",
          trips: "My Trips",
          profile: "Profile",
          notify: "Notifications",
        };

        return (
          <div
            style={{
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: 18,
              padding: "20px 0",
            }}
          >
            <div
              style={{
                display: "flex",
                gap: 7,
                flexWrap: "wrap",
                justifyContent: "center",
                maxWidth: 560,
              }}
            >
              {Object.entries(LABELS).map(([s, lb]) => (
                <button
                  key={s}
                  onClick={() => setScreen(s)}
                  style={{
                    background: screen === s ? C.primary : "#f1f5f9",
                    border: `1px solid ${screen === s ? C.primary : "#e2e8f0"}`,
                    borderRadius: 10,
                    padding: "5px 12px",
                    color: screen === s ? "#fff" : "#64748b",
                    fontSize: 12,
                    cursor: "pointer",
                    fontWeight: screen === s ? 600 : 400,
                    fontFamily: "'DM Sans',sans-serif",
                  }}
                >
                  {lb}
                </button>
              ))}
            </div>
            <div
              style={{
                width: 375,
                background: C.bg,
                borderRadius: 46,
                height: 812,
                overflow: "hidden",
                overflowY: "auto",
                boxShadow: `0 0 0 10px #d1d5db, 0 32px 80px rgba(0,0,0,.15)`,
                border: `1px solid ${C.border}`,
              }}
            >
              {SCREENS[screen]}
            </div>
          </div>
        );
      }
